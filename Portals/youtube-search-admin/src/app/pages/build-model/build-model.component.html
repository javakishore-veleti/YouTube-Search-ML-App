<div class="build-container p-4">
  <h2 class="fw-bold mb-1"><i class="bi bi-hammer me-2 text-ocean"></i>Build Model</h2>
  <p class="text-muted-cool mb-4">Select an ML approach, configure your API key, and build a model.</p>

  <div class="build-card p-4 mb-4">
    <!-- API Key (stored in browser only) -->
    <div class="mb-4">
      <label class="form-label fw-semibold"><i class="bi bi-key-fill me-1 text-sky"></i> YouTube API Key</label>
      <div class="input-group">
        <input
          type="password"
          class="form-control custom-input"
          placeholder="Enter your YouTube Data API v3 key"
          [(ngModel)]="apiKey"
        />
        <button class="btn btn-ocean rounded-end" (click)="onSaveApiKey()">
          <i class="bi bi-save me-1"></i> Save to Browser
        </button>
      </div>
      <small class="text-muted-cool mt-1 d-block">
        <i class="bi bi-shield-lock me-1"></i>
        Stored in your browser only. Never sent to the backend.
      </small>
      <span *ngIf="hasStoredKey" class="badge bg-success-soft text-success mt-2">
        <i class="bi bi-check-circle me-1"></i>API key saved
      </span>
    </div>

    <!-- Approach Dropdown -->
    <div class="mb-4">
      <label class="form-label fw-semibold"><i class="bi bi-cpu me-1 text-sky"></i> ML Approach</label>
      <select class="form-select custom-select" [(ngModel)]="selectedApproach">
        <option value="" disabled>— Select an approach —</option>
        <option *ngFor="let a of approaches" [value]="a.id">{{ a.name }}</option>
      </select>
    </div>

    <!-- Approach Cards -->
    <div *ngIf="selectedApproach" class="approach-detail mb-4 p-3">
      <div *ngFor="let a of approaches">
        <div *ngIf="a.id === selectedApproach" class="d-flex align-items-center">
          <i class="bi {{ a.icon }} fs-2 text-ocean me-3"></i>
          <div>
            <h6 class="fw-bold mb-0">{{ a.name }}</h6>
            <small class="text-muted-cool">Selected approach for model building</small>
          </div>
        </div>
      </div>
    </div>

    <!-- Publish Toggle -->
    <div class="form-check form-switch mb-4">
      <input class="form-check-input" type="checkbox" id="publishLatest" [(ngModel)]="publishAsLatest" />
      <label class="form-check-label fw-semibold" for="publishLatest">
        Publish as <span class="text-ocean">latest</span> after build
      </label>
    </div>

    <!-- Build Button -->
    <button
      class="btn btn-ocean btn-lg rounded-pill px-5"
      (click)="onBuild()"
      [disabled]="isBuilding || !selectedApproach || !hasStoredKey"
    >
      <i class="bi me-2" [ngClass]="isBuilding ? 'bi-arrow-repeat spin' : 'bi-rocket-takeoff-fill'"></i>
      {{ isBuilding ? 'Building...' : 'Build Model' }}
    </button>

    <!-- Result -->
    <div *ngIf="buildResult" class="alert alert-ocean mt-4">
      <i class="bi bi-info-circle-fill me-2"></i> {{ buildResult }}
    </div>
  </div>
</div>
